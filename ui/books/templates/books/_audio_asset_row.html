<div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg hover:bg-gray-100">
    <div class="flex items-center gap-3">
        <button onclick="playAsset({{ asset.id }})" 
                class="w-8 h-8 bg-blue-500 text-white rounded-full flex items-center justify-center hover:bg-blue-600">
            ▶
        </button>
        <div>
            <div class="font-medium">{{ asset.name }}</div>
            <div class="text-xs text-gray-500">
                {% if asset.duration_seconds %}
                    {{ asset.duration_seconds|floatformat:1 }}s
                {% endif %}
                {% if asset.file_size_kb %}
                    • {{ asset.file_size_kb }}KB
                {% endif %}
                {% if asset.description %}
                    • {{ asset.description|truncatewords:10 }}
                {% endif %}
            </div>
        </div>
    </div>
    <div class="flex gap-2">
        <a href="{% url 'audio_asset_download' asset.id %}" 
           class="px-2 py-1 bg-green-100 text-green-700 rounded text-xs hover:bg-green-200">
            ⬇️ Download
        </a>
        <button onclick="deleteAsset({{ asset.id }})" 
                class="px-2 py-1 bg-red-100 text-red-600 rounded text-xs hover:bg-red-200">
            🗑️ Delete
        </button>
    </div>
</div>
