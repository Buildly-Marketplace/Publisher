{% extends "base.html" %}

{% block title %}Books | Forge Publisher{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold mb-6">Books</h1>
<div class="bg-white rounded shadow p-6">
    {% if books %}
        <ul class="divide-y divide-gray-200">
            {% for book in books %}
                <li class="py-2 flex items-center justify-between">
                    <span class="font-mono">{{ book }}</span>
                    <a href="{% url 'book_data_editor' book %}" class="text-indigo-600 hover:underline text-sm">Edit</a>
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p class="text-gray-500">No books found.</p>
    {% endif %}
</div>
<a href="/" class="mt-6 inline-block text-indigo-600 hover:underline">&larr; Back to manuscripts</a>
{% endblock %}
